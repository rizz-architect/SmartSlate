name: Daily Badge Farmer

on:
  schedule:
    # Runs daily at 2:15 AM IST (8:45 PM UTC)
    - cron: '45 20 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  farm-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Badge Farmer Script
        shell: pwsh
        env:
          MAIN_TOKEN: ${{ secrets.MAIN_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          ./.github/workflows/scripts/badge-farmer.ps1
