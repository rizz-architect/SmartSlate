services:
  - type: web
    name: smart-attendance-system
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GROQ_API_KEY
        sync: false # User must set this in the Render dashboard
    autoDeploy: true
