<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Smart Attendance | Secure Entry</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">
  <header class="fyn-header">
    <div class="fyn-logo">SMART ATTENDANCE</div>
    <nav class="fyn-nav">
      <a href="index.html">Monitor</a>
      <a href="register.html" class="active">Student Entry</a>
      <a href="dashboard.html">Hub</a>
      <a href="profile.html">Profiles</a>
    </nav>
  </header>

  <main class="fyn-main" style="max-width: 800px; margin: 0 auto;">
    <h1 class="fyn-title" style="font-size: 3rem; text-align: center;">Secure <br>Student Entry.</h1>
    
    <div class="fyn-panel" style="background: white; border: 1px solid rgba(0,0,0,0.05); padding: 40px;">
      <div style="margin-bottom: 30px;">
        <label style="display: block; font-weight: 700; margin-bottom: 10px;">Full Name</label>
        <input type="text" id="reg-name" placeholder="Enter student's full name" style="width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; font-size: 1rem;">
      </div>
      
      <div style="margin-bottom: 30px;">
        <label style="display: block; font-weight: 700; margin-bottom: 10px;">Department / Batch</label>
        <input type="text" id="reg-details" placeholder="e.g. CSE / Batch 14" style="width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; font-size: 1rem;">
      </div>

      <div class="fyn-video-wrap" style="aspect-ratio: 16/9; margin-bottom: 30px; border: 2px solid var(--panel-bg);">
        <video id="video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>

      <div style="text-align: center;">
        <button class="fyn-btn" onclick="registerStudent()" style="background: var(--accent); color: white; width: 100%; justify-content: center;">
          <span>Register Face Securely</span>
          <span>→</span>
        </button>
        <p id="reg-message" style="margin-top: 20px; font-weight: 600; color: var(--text-dim);"></p>
      </div>
    </div>
  </main>

  <script src="script.js?v=5"></script>
</body>
</html>
